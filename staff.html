<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在室確認・過去ログ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      padding: 20px;
    }

    h2 { font-size: 20px; color: #333; margin-bottom: 16px; }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 0;
    }
    .tab {
      padding: 8px 20px;
      border-radius: 6px 6px 0 0;
      border: none;
      background: #dde3ea;
      color: #555;
      font-size: 15px;
      cursor: pointer;
    }
    .tab.active { background: #4a90d9; color: #fff; font-weight: bold; }

    .panel { display: none; }
    .panel.active { display: block; }

    .panel-body {
      background: #fff;
      border-radius: 0 8px 8px 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 16px;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead { background: #4a90d9; color: #fff; }
    th, td {
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f7f9fc; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-in   { background: #d4edda; color: #1a7a3f; }
    .badge-auto { background: #fff3cd; color: #856404; }
    .long { color: #c0392b; font-weight: bold; }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .filter-bar label { font-size: 13px; color: #555; }
    .filter-bar input,
    .filter-bar select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button.btn {
      padding: 7px 16px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button.btn:active { background: #357abd; }
    button.btn-sm {
      padding: 4px 10px;
      font-size: 12px;
      background: #e8a020;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button.btn-sm:active { background: #c07010; }
    button.btn-cancel {
      padding: 4px 10px;
      font-size: 12px;
      background: #aaa;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 4px;
    }

    .meta { font-size: 12px; color: #888; margin-bottom: 10px; }
    .count { font-size: 14px; color: #555; margin-bottom: 12px; }

    .error-msg {
      color: #c0392b;
      font-size: 14px;
      margin-bottom: 10px;
      display: none;
    }

    .empty-msg {
      text-align: center;
      padding: 36px;
      color: #aaa;
      font-size: 15px;
    }

    /* 修正フォーム（行内インライン） */
    .fix-form {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .fix-form input[type="time"] {
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .fix-msg {
      font-size: 12px;
      margin-left: 6px;
    }
    .fix-msg.ok  { color: #1a7a3f; }
    .fix-msg.err { color: #c0392b; }
  </style>
</head>
<body>

<h2>塾生 在室管理</h2>

<div class="tabs">
  <button class="tab active" onclick="switchTab('current')">在室中</button>
  <button class="tab"        onclick="switchTab('logs')">過去ログ</button>
</div>

<!-- 在室中 -->
<div id="panel-current" class="panel active">
  <div class="panel-body">
    <div class="error-msg" id="err-current">データの取得に失敗しました。</div>
    <div class="meta" id="updated"></div>
    <div class="count" id="current-count"></div>
    <button class="btn" onclick="loadCurrent()" style="margin-bottom:14px;">再読み込み</button>
    <div id="current-body"></div>
  </div>
</div>

<!-- 過去ログ -->
<div id="panel-logs" class="panel">
  <div class="panel-body">
    <div class="filter-bar">
      <label>開始日 <input type="date" id="from-date"></label>
      <label>終了日 <input type="date" id="to-date"></label>
      <label>塾生
        <select id="filter-name"><option value="">全員</option></select>
      </label>
      <button class="btn" onclick="loadLogs()">絞り込み</button>
    </div>
    <div class="error-msg" id="err-logs">データの取得に失敗しました。</div>
    <div class="meta" id="log-info"></div>
    <div id="logs-body"></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwjyfkI6m6RVizT1GRrJBNGOJ_WnZ7WFBBBWmxkTEVgGxta3Nr4Q5g0g0-ku3Ie7vic/exec";

  // ======== タブ ========
  function switchTab(name) {
    document.querySelectorAll(".tab").forEach((t, i) => {
      t.classList.toggle("active", ["current","logs"][i] === name);
    });
    ["current","logs"].forEach(n => {
      document.getElementById(`panel-${n}`).classList.toggle("active", n === name);
    });
    if (name === "logs" && document.getElementById("logs-body").innerHTML === "") {
      setDefaultDates();
      loadLogs();
    }
  }

  // ======== 在室中 ========
  async function loadCurrent() {
    document.getElementById("err-current").style.display = "none";
    try {
      const res  = await fetch(`${GAS_URL}?action=current&t=${Date.now()}`);
      const list = await res.json();
      const body = document.getElementById("current-body");

      if (list.length === 0) {
        document.getElementById("current-count").textContent = "";
        body.innerHTML = '<div class="empty-msg">現在在室中の塾生はいません</div>';
      } else {
        document.getElementById("current-count").textContent = `在室中：${list.length}名`;
        let html = `<table><thead><tr>
          <th>氏名</th><th>塾生番号</th><th>入室時刻</th><th>滞在時間</th>
        </tr></thead><tbody>`;
        for (const s of list) {
          const h    = Math.floor(s.minutes / 60);
          const m    = s.minutes % 60;
          const stay = h > 0 ? `${h}時間${m}分` : `${m}分`;
          const long = false;
          html += `<tr>
            <td>${s.name}</td>
            <td>${s.studentId}</td>
            <td><span class="badge badge-in">IN</span> ${s.inTime}</td>
            <td class="${long ? "long" : ""}">${stay}${long ? " ⚠" : ""}</td>
          </tr>`;
        }
        html += "</tbody></table>";
        body.innerHTML = html;
      }

      const now = new Date();
      document.getElementById("updated").textContent =
        `最終更新：${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`;
    } catch {
      document.getElementById("err-current").style.display = "block";
    }
  }

  // ======== 過去ログ ========
  function setDefaultDates() {
    const t  = new Date();
    const yy = t.getFullYear();
    const mm = String(t.getMonth() + 1).padStart(2,"0");
    const dd = String(t.getDate()).padStart(2,"0");
    document.getElementById("from-date").value = `${yy}-${mm}-01`;
    document.getElementById("to-date").value   = `${yy}-${mm}-${dd}`;
  }

  async function loadLogs() {
    const from = document.getElementById("from-date").value;
    const to   = document.getElementById("to-date").value;
    document.getElementById("err-logs").style.display = "none";
    document.getElementById("log-info").textContent = "読み込み中...";
    document.getElementById("logs-body").innerHTML  = "";

    try {
      const res      = await fetch(`${GAS_URL}?action=logs&from=${from}&to=${to}&t=${Date.now()}`);
      const sessions = await res.json();

      // 塾生プルダウン更新
      const names = [...new Set(sessions.map(s => s.name))].sort();
      const sel   = document.getElementById("filter-name");
      const prev  = sel.value;
      sel.innerHTML = '<option value="">全員</option>';
      names.forEach(n => {
        const opt = document.createElement("option");
        opt.value = n; opt.textContent = n;
        if (n === prev) opt.selected = true;
        sel.appendChild(opt);
      });

      const filterName = sel.value;
      const filtered   = filterName ? sessions.filter(s => s.name === filterName) : sessions;

      document.getElementById("log-info").textContent =
        `${from} 〜 ${to}　${filtered.length}件`;

      if (filtered.length === 0) {
        document.getElementById("logs-body").innerHTML =
          '<div class="empty-msg">該当するログがありません</div>';
        return;
      }

      let html = `<table><thead><tr>
        <th>日付</th><th>氏名</th><th>入室</th><th>退室</th><th>滞在時間</th><th>修正</th>
      </tr></thead><tbody>`;

      for (const s of filtered) {
        const h    = Math.floor(s.minutes / 60);
        const m    = s.minutes % 60;
        const stay = h > 0 ? `${h}時間${m}分` : `${m}分`;
        const autoLabel = s.autoOut
          ? `<span class="badge badge-auto">自動</span> ${s.outTime}`
          : s.outTime;

        html += `<tr id="row-${s.outRow}">
          <td>${s.date}</td>
          <td>${s.name}</td>
          <td>${s.inTime}</td>
          <td id="out-${s.outRow}">${autoLabel}</td>
          <td id="stay-${s.outRow}">${stay}</td>
          <td>
            <button class="btn-sm" onclick="showFixForm(${s.outRow}, '${s.outTime}', '${s.inTime}')">修正</button>
          </td>
        </tr>
        <tr id="fix-row-${s.outRow}" style="display:none;">
          <td colspan="6">
            <div class="fix-form">
              <span style="font-size:13px;">退室時刻を修正：</span>
              <input type="time" id="fix-time-${s.outRow}" value="${s.outTime}">
              <button class="btn-sm" onclick="submitFix(${s.outRow}, '${s.inTime}')">保存</button>
              <button class="btn-cancel" onclick="hideFixForm(${s.outRow})">キャンセル</button>
              <span class="fix-msg" id="fix-msg-${s.outRow}"></span>
            </div>
          </td>
        </tr>`;
      }
      html += "</tbody></table>";
      document.getElementById("logs-body").innerHTML = html;

    } catch {
      document.getElementById("err-logs").style.display = "block";
      document.getElementById("log-info").textContent = "";
    }
  }

  // ======== 退室時刻修正 ========
  function showFixForm(outRow, outTime, inTime) {
    document.getElementById(`fix-row-${outRow}`).style.display = "table-row";
    document.getElementById(`fix-time-${outRow}`).value = outTime;
    document.getElementById(`fix-msg-${outRow}`).textContent = "";
  }

  function hideFixForm(outRow) {
    document.getElementById(`fix-row-${outRow}`).style.display = "none";
  }

  async function submitFix(outRow, inTime) {
    const timeVal = document.getElementById(`fix-time-${outRow}`).value;
    const msgEl   = document.getElementById(`fix-msg-${outRow}`);

    if (!timeVal) { msgEl.textContent = "時刻を入力してください"; msgEl.className = "fix-msg err"; return; }

    // 入室時刻より前になっていないかチェック
    if (timeVal <= inTime) {
      msgEl.textContent = `入室時刻(${inTime})より後の時刻を入力してください`;
      msgEl.className = "fix-msg err";
      return;
    }

    msgEl.textContent = "保存中..."; msgEl.className = "fix-msg";

    try {
      const res  = await fetch(`${GAS_URL}?action=fix&row=${outRow}&time=${timeVal}&t=${Date.now()}`);
      const data = await res.json();

      if (data.status === "ok") {
        msgEl.textContent = "保存しました"; msgEl.className = "fix-msg ok";
        // 表示を即時更新
        document.getElementById(`out-${outRow}`).textContent = timeVal;
        const inH = parseInt(inTime.split(":")[0]), inM = parseInt(inTime.split(":")[1]);
        const otH = parseInt(timeVal.split(":")[0]),  otM = parseInt(timeVal.split(":")[1]);
        const mins = (otH * 60 + otM) - (inH * 60 + inM);
        const h = Math.floor(mins / 60), m = mins % 60;
        document.getElementById(`stay-${outRow}`).textContent =
          mins > 0 ? (h > 0 ? `${h}時間${m}分` : `${m}分`) : "-";
        setTimeout(() => hideFixForm(outRow), 1500);
      } else {
        msgEl.textContent = "保存に失敗しました"; msgEl.className = "fix-msg err";
      }
    } catch {
      msgEl.textContent = "通信エラー"; msgEl.className = "fix-msg err";
    }
  }

  document.getElementById("filter-name").addEventListener("change", loadLogs);

  // 初回
  loadCurrent();
  setInterval(loadCurrent, 120000);
</script>
</body>
</html>
