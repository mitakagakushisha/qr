<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR 入退室記録</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    video { width: 75%; height: auto; margin-top: 20px; }
    #result { font-size: 24px; margin-top: 20px; }
    #switchBtn { margin-top: 10px; padding: 8px 16px; font-size: 16px; }
  </style>
</head>
<body>

<h2>QR 入退室記録</h2>
<video id="video"></video>
<br>
<button id="switchBtn">外カメに切り替え</button>
<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script>
  const GAS_URL = "★あなたのGASのURL★";
  const API_KEY = "★あなたのAPIキー★";

  const video = document.getElementById("video");
  const result = document.getElementById("result");
  const switchBtn = document.getElementById("switchBtn");

  let currentCamera = "user"; // 最初はインカメ
  let currentStream = null;

  async function startCamera() {
    // ★ 既存ストリームを完全停止（これが無いと映像が出ない）
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentCamera }
      });

      currentStream = stream;
      video.srcObject = stream;
      await video.play();

    } catch (err) {
      console.error("カメラ起動エラー:", err);
      result.textContent = "カメラを起動できませんでした";
    }
  }

  // 初期起動（インカメ）
  startCamera();

  // カメラ切り替え
  switchBtn.onclick = () => {
    currentCamera = currentCamera === "user" ? "environment" : "user";
    switchBtn.textContent = currentCamera === "user" ? "外カメに切り替え" : "インカメに切り替え";
    startCamera();
  };

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  function scan() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth * 0.7;
      canvas.height = video.videoHeight * 0.7;

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code) {
        const jukusei = code.data;

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            jukusei: jukusei,
            timestamp: new Date().toISOString(),
            api_key: API_KEY
          })
        });

        result.textContent = `読み取り：${jukusei}`;
        setTimeout(() => result.textContent = "", 2000);
      }
    }
    requestAnimationFrame(scan);
  }

  scan();
</script>

</body>
</html>
