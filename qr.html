<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR 入退室記録</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    video { width: 75%; height: auto; margin-top: 20px; }
    #result { font-size: 24px; margin-top: 20px; }
    #switchBtn { margin-top: 10px; padding: 8px 16px; font-size: 16px; }
  </style>
</head>
<body>

<h2>QR 入退室記録</h2>
<video id="video" muted playsinline></video>
<br>
<button id="switchBtn">外カメに切り替え</button>
<div id="result"></div>

<!-- QRScanner.js -->
<script src="https://unpkg.com/qr-scanner/qr-scanner.min.js"></script>

<script>
  const GAS_URL = "★あなたのGASのURL★";
  const API_KEY = "★あなたのAPIキー★";

  const video = document.getElementById("video");
  const result = document.getElementById("result");
  const switchBtn = document.getElementById("switchBtn");

  let currentCamera = 0; // 0 = インカメ、1 = 外カメ
  let cameras = [];
  let scanner = null;

  async function startScanner() {
    cameras = await QrScanner.listCameras(true);

    if (cameras.length === 0) {
      result.textContent = "カメラが見つかりません";
      return;
    }

    const camId = cameras[currentCamera]?.id || cameras[0].id;

    if (scanner) scanner.destroy();

    scanner = new QrScanner(
      video,
      qr => {
        result.textContent = `読み取り：${qr}`;

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            jukusei: qr,
            timestamp: new Date().toISOString(),
            api_key: API_KEY
          })
        });

        setTimeout(() => result.textContent = "", 2000);
      },
      { preferredCamera: camId }
    );

    scanner.start();
  }

  // 初期起動
  startScanner();

  // カメラ切り替え
  switchBtn.onclick = () => {
    currentCamera = currentCamera === 0 ? 1 : 0;
    switchBtn.textContent =
      currentCamera === 0 ? "外カメに切り替え" : "インカメに切り替え";

    startScanner();
  };
</script>

</body>
</html>
