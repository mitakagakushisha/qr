<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camera Debug</title>
</head>
<body>

<h2>カメラ一覧（デバッグ）</h2>
<pre id="out">読み込み中...</pre>

<script type="module">
  import { BrowserQRCodeReader } from "https://cdn.jsdelivr.net/npm/@zxing/browser@latest";

  const out = document.getElementById("out");

  async function debug() {
    try {
      const devices = await BrowserQRCodeReader.listVideoInputDevices();

      out.textContent = JSON.stringify(devices, null, 2);
    } catch (e) {
      out.textContent = "エラー: " + e;
    }
  }

  debug();
</script>

</body>
</html>
