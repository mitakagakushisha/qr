<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 入退室記録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h2 {
      margin: 16px 0 16px;
      font-size: 20px;
      color: #333;
    }

    #reader {
      width: min(75vw, 480px);
      border-radius: 8px;
      overflow: hidden;
    }

    #status {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      min-height: 36px;
      color: #333;
    }

    #status.success { color: #1a7a3f; }
    #status.error   { color: #c0392b; }
    #status.sending { color: #2471a3; }
  </style>
</head>
<body>

<h2>QR 入退室記録</h2>
<div id="reader"></div>
<div id="status"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const GAS_URL  = "https://script.google.com/macros/s/AKfycbwjyfkI6m6RVizT1GRrJBNGOJ_WnZ7WFBBBWmxkTEVgGxta3Nr4Q5g0g0-ku3Ie7vic/exec";
  const API_KEY  = "★あなたのAPIキー★";
  const COOLDOWN = 3000; // 同一QRを再送するまでの待機時間（ミリ秒）

  const statusEl = document.getElementById("status");
  let lastCode = null;
  let lastTime = 0;
  let isSending = false;

  function setStatus(msg, cls = "") {
    statusEl.textContent = msg;
    statusEl.className = cls;
  }

  async function onScanSuccess(qrCode) {
    const now = Date.now();

    // 同一QRの連打防止
    if (qrCode === lastCode && now - lastTime < COOLDOWN) return;
    // 送信中は無視
    if (isSending) return;

    lastCode = qrCode;
    lastTime = now;
    isSending = true;

    setStatus("送信中...", "sending");

    try {
      const res = await fetch(GAS_URL, {
  method: "POST",
  body: new URLSearchParams({
    jukusei:   qrCode,
    timestamp: new Date().toISOString(),
    api_key:   API_KEY
  })
});

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      setStatus(`✓ ${qrCode}`, "success");
    } catch (e) {
      console.error(e);
      setStatus("送信失敗。通信を確認してください。", "error");
    } finally {
      isSending = false;
      setTimeout(() => setStatus(""), 2500);
    }
  }

  function onScanFailure(error) {
    // フレームごとの読み取り失敗は無視（コンソールにも出さない）
  }

  const html5QrCode = new Html5QrcodeScanner(
    "reader",
    {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      rememberLastUsedCamera: true,
      showTorchButtonIfSupported: true
    },
    false // verbose
  );

  html5QrCode.render(onScanSuccess, onScanFailure);
</script>
</body>
</html>
