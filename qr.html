<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 入退室記録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      user-select: none;
    }

    h2 { color: #333; font-size: 20px; margin-bottom: 16px; }

    #reader-wrapper {
      position: relative;
      width: min(90vw, 680px);
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #ccc;
    }

    /* 入退室メッセージ：映像上部に重なって表示 */
    #message-top {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      padding: 14px 18px;
      line-height: 1.6;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      pointer-events: none;
    }

    /* はじくメッセージ：映像下部に重なって表示 */
    #message-bottom {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      padding: 10px 14px;
      line-height: 1.5;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      pointer-events: none;
    }

    #message-top.show { opacity: 1; }
    #message-bottom.show { opacity: 1; }

    #message-top.in      { background: rgba(212, 237, 218, 0.95); color: #1a7a3f; }
    #message-top.out     { background: rgba(248, 215, 218, 0.95); color: #a93226; }
    #message-top.sending { background: rgba(210, 230, 250, 0.95); color: #1a4a7a; font-size: 16px; }
    #message-bottom.err  { background: rgba(226, 227, 229, 0.95); color: #555; }

    #lock-shield {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 120;
      background: transparent;
    }
    #lock-shield.show { display: block; }

    #lock-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid #bbb;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #lock-btn:active { background: #eee; }
    #lock-btn svg { width: 28px; height: 28px; }

    #lock-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #lock-overlay.show { display: flex; }
    #lock-overlay p { color: #fff; font-size: 16px; }

    #pw-input {
      width: 180px;
      padding: 10px 14px;
      font-size: 22px;
      border-radius: 8px;
      border: 1px solid #555;
      text-align: center;
      letter-spacing: 0.2em;
      background: #222;
      color: #fff;
    }

    #pw-error { color: #e74c3c; font-size: 14px; min-height: 20px; }

    #pw-submit {
      padding: 10px 28px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    #pw-submit:active { background: #357abd; }
  </style>
</head>
<body>

<h2>QR 入退室記録</h2>

<div id="reader-wrapper">
  <div id="reader"></div>
  <div id="message-top"></div>
  <div id="message-bottom"></div>
</div>

<div id="lock-shield"></div>

<button id="lock-btn" onclick="handleLockBtn()" title="ロック切り替え">
  <svg id="icon-unlocked" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
  </svg>
  <svg id="icon-locked" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
</button>

<div id="lock-overlay">
  <p>🔒 ロック中</p>
  <p style="font-size:13px; color:#aaa;">パスワードを入力してロックを解除</p>
  <input type="password" id="pw-input" maxlength="6" placeholder="------"
    oninput="document.getElementById('pw-error').textContent=''"
    onkeydown="if(event.key==='Enter') checkPassword()">
  <div id="pw-error"></div>
  <button id="pw-submit" onclick="checkPassword()">解除</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const GAS_URL        = "https://script.google.com/macros/s/AKfycbwjyfkI6m6RVizT1GRrJBNGOJ_WnZ7WFBBBWmxkTEVgGxta3Nr4Q5g0g0-ku3Ie7vic/exec";
  const API_KEY        = "";
  const IN_TO_OUT_WAIT = 60000; // 入退室後の次読み取りまでの待機（ms）
  const SCAN_PAUSE     = 3000;  // 読み取り後にスキャンを止める時間（ms）
  const MSG_DURATION   = 3000;  // メッセージ表示時間（ms）

  const msgTop    = document.getElementById("message-top");
  const msgBottom = document.getElementById("message-bottom");

  let lastType     = null;
  let lastTypeTime = 0;
  let isSending    = false;
  let isLocked     = false;
  let scanPaused   = false; // スキャン一時停止フラグ
  let topTimer     = null;
  let bottomTimer  = null;

  function showTop(text, type, duration = MSG_DURATION) {
    msgTop.textContent = text;
    msgTop.className   = `show ${type}`;
    clearTimeout(topTimer);
    topTimer = setTimeout(() => { msgTop.className = ""; }, duration);
  }

  function showBottom(text, duration = MSG_DURATION) {
    msgBottom.textContent = text;
    msgBottom.className   = "show err";
    clearTimeout(bottomTimer);
    bottomTimer = setTimeout(() => { msgBottom.className = ""; }, duration);
  }

  async function onScanSuccess(qrCode) {
    // スキャン一時停止中は完全無視（二重読み取り防止）
    if (scanPaused) return;
    if (isSending)  return;

    const now = Date.now();

    // 入退室後の待機チェック（同一人物の連続処理防止）
    if (lastType !== null && now - lastTypeTime < IN_TO_OUT_WAIT) {
      const action = lastType === "IN" ? "入室" : "退室";
      showBottom(`すでに${action}は完了しています。\n次の読み取りは時間をおいてから行ってください。`);
      return;
    }

    // 読み取り確定 → スキャンをSCAN_PAUSE秒止めて二重読み取りを防ぐ
    scanPaused = true;
    setTimeout(() => { scanPaused = false; }, SCAN_PAUSE);

    isSending = true;
    showTop("読み取りました。送信中...", "sending", 10000);

    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          student_id: qrCode,
          timestamp:  new Date().toISOString(),
          api_key:    API_KEY
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const name = data.name || qrCode;
      const type = data.type;

      lastType     = type;
      lastTypeTime = Date.now();

      if (type === "IN") {
        showTop(`${name}さん、こんにちは。\n入室を確認しました。`, "in");
      } else {
        showTop(`${name}さん、おつかれさまでした。\n退室を確認しました。`, "out");
      }

    } catch {
      showTop("送信失敗。通信を確認してください。", "err");
    } finally {
      isSending = false;
    }
  }

  function handleLockBtn() {
    if (!isLocked) {
      isLocked = true;
      document.getElementById("lock-shield").classList.add("show");
      document.body.style.overflow = "hidden";
      document.getElementById("icon-unlocked").style.display = "none";
      document.getElementById("icon-locked").style.display   = "block";
    } else {
      document.getElementById("lock-overlay").classList.add("show");
      document.getElementById("pw-input").focus();
    }
  }

  function checkPassword() {
    const val = document.getElementById("pw-input").value;
    if (val === "038491") {
      isLocked = false;
      document.getElementById("lock-shield").classList.remove("show");
      document.body.style.overflow = "";
      document.getElementById("lock-overlay").classList.remove("show");
      document.getElementById("icon-unlocked").style.display = "block";
      document.getElementById("icon-locked").style.display   = "none";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-error").textContent = "";
    } else {
      document.getElementById("pw-error").textContent = "パスワードが違います";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  document.addEventListener("touchstart", function(e) {
    if (isLocked && !document.getElementById("lock-btn").contains(e.target) && !document.getElementById("lock-overlay").contains(e.target)) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, { passive: false, capture: true });

  document.addEventListener("mousedown", function(e) {
    if (isLocked && !document.getElementById("lock-btn").contains(e.target) && !document.getElementById("lock-overlay").contains(e.target)) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, { capture: true });

  function warmupGAS() {
    fetch(GAS_URL + "?action=warmup&t=" + Date.now()).catch(() => {});
  }
  warmupGAS();
  setInterval(warmupGAS, 5 * 60 * 1000);

  const html5QrCode = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: { width: 280, height: 280 }, rememberLastUsedCamera: true, showTorchButtonIfSupported: true },
    false
  );
  html5QrCode.render(onScanSuccess, () => {});
</script>
</body>
</html>
