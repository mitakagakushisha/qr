<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR тЁЦжђђт«цУеўжї▓</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    video { width: 90%; margin-top: 20px; }
    #result { font-size: 24px; margin-top: 20px; }
  </style>
</head>
<body>

<h2>QR тЁЦжђђт«цУеўжї▓</h2>
<video id="video" style="width: 75%; height: auto;"></video>
<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script>
  const GAS_URL = "РўЁсЂѓсЂфсЂЪсЂ«GASсЂ«URLРўЁ";
  const API_KEY = "РўЁсЂѓсЂфсЂЪсЂ«APIсѓГсЃ╝РўЁ";

  const video = document.getElementById("camera");
  const result = document.getElementById("result");

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => video.srcObject = stream);

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  function scan() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code) {
        const jukusei = code.data;

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            jukusei: jukusei,
            timestamp: new Date().toISOString(),
            api_key: API_KEY
          })
        });

        result.textContent = `УфГсЂ┐тЈќсѓі№╝џ${jukusei}`;
        setTimeout(() => result.textContent = "", 2000);
      }
    }
    requestAnimationFrame(scan);
  }

  scan();
</script>

</body>
</html>
