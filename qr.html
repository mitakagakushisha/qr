<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 入退室記録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      user-select: none;
    }

    h2 {
      color: #fff;
      font-size: 20px;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    /* カメラ */
    #reader {
      width: min(80vw, 520px);
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #444;
    }

    /* メッセージ表示エリア */
    #message {
      margin-top: 24px;
      width: min(80vw, 520px);
      min-height: 80px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      padding: 16px 20px;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #message.show { opacity: 1; }
    #message.in  { background: #1a7a3f; color: #fff; }
    #message.out { background: #a93226; color: #fff; }
    #message.err { background: #555; color: #eee; font-size: 15px; }

    /* ロックボタン */
    #lock-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #lock-btn:active { background: rgba(255,255,255,0.3); }

    /* ロックオーバーレイ */
    #lock-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #lock-overlay.show { display: flex; }

    #lock-overlay p {
      color: #fff;
      font-size: 16px;
    }

    #pw-input {
      width: 180px;
      padding: 10px 14px;
      font-size: 20px;
      border-radius: 8px;
      border: none;
      text-align: center;
      letter-spacing: 0.2em;
      background: #222;
      color: #fff;
      border: 1px solid #555;
    }

    #pw-error {
      color: #e74c3c;
      font-size: 14px;
      min-height: 20px;
    }

    #pw-submit {
      padding: 10px 28px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    #pw-submit:active { background: #357abd; }

    /* ロック中はスキャンエリアをブロック */
    body.locked #reader { pointer-events: none; filter: brightness(0.4); }
  </style>
</head>
<body>

<h2>QR 入退室記録</h2>
<div id="reader"></div>
<div id="message"></div>

<!-- ロックボタン（南京錠） -->
<button id="lock-btn" onclick="toggleLock()" title="ロック切り替え">🔓</button>

<!-- ロック解除オーバーレイ -->
<div id="lock-overlay">
  <p>🔒 ロック中</p>
  <p style="font-size:13px; color:#aaa;">パスワードを入力してロックを解除</p>
  <input type="password" id="pw-input" maxlength="6" placeholder="------"
    oninput="document.getElementById('pw-error').textContent=''"
    onkeydown="if(event.key==='Enter') checkPassword()">
  <div id="pw-error"></div>
  <button id="pw-submit" onclick="checkPassword()">解除</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const GAS_URL  = "https://script.google.com/macros/s/AKfycbwjyfkI6m6RVizT1GRrJBNGOJ_WnZ7WFBBBWmxkTEVgGxta3Nr4Q5g0g0-ku3Ie7vic/exec";
  const API_KEY  = "";
  const PASSWORD = "038491";
  const COOLDOWN = 3000;

  const msgEl   = document.getElementById("message");
  let lastCode  = null;
  let lastTime  = 0;
  let isSending = false;
  let isLocked  = false;

  // ======== メッセージ表示 ========
  function showMessage(text, type) {
    msgEl.textContent = text;
    msgEl.className   = `show ${type}`;
    clearTimeout(msgEl._timer);
    msgEl._timer = setTimeout(() => {
      msgEl.className = "";
    }, 3000);
  }

  // ======== QRスキャン ========
  async function onScanSuccess(qrCode) {
    if (isLocked) return;
    const now = Date.now();
    if (qrCode === lastCode && now - lastTime < COOLDOWN) return;
    if (isSending) return;

    lastCode  = qrCode;
    lastTime  = now;
    isSending = true;

    try {
      const res  = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          student_id: qrCode,
          timestamp:  new Date().toISOString(),
          api_key:    API_KEY
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const name = data.name || qrCode;
      const type = data.type;

      if (type === "IN") {
        showMessage(`${name}さん、こんにちは。\n入室を確認しました。`, "in");
      } else {
        showMessage(`${name}さん、おつかれさまでした。\n退室を確認しました。`, "out");
      }

    } catch (e) {
      showMessage("送信失敗。通信を確認してください。", "err");
    } finally {
      isSending = false;
    }
  }

  // ======== ロック機能 ========
  function toggleLock() {
    if (!isLocked) {
      // ロックをかける
      isLocked = true;
      document.body.classList.add("locked");
      document.getElementById("lock-btn").textContent = "🔒";
      document.getElementById("lock-overlay").classList.add("show");
      document.getElementById("pw-input").focus();
    } else {
      // ロック中にボタンを押してもオーバーレイを再表示するだけ
      document.getElementById("lock-overlay").classList.add("show");
      document.getElementById("pw-input").focus();
    }
  }

  function checkPassword() {
    const val = document.getElementById("pw-input").value;
    if (val === PASSWORD) {
      isLocked = false;
      document.body.classList.remove("locked");
      document.getElementById("lock-btn").textContent = "🔓";
      document.getElementById("lock-overlay").classList.remove("show");
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-error").textContent = "";
    } else {
      document.getElementById("pw-error").textContent = "パスワードが違います";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  // ======== html5-qrcode 起動 ========
  const html5QrCode = new Html5QrcodeScanner(
    "reader",
    {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      rememberLastUsedCamera: true,
      showTorchButtonIfSupported: true
    },
    false
  );

  html5QrCode.render(onScanSuccess, () => {});
</script>
</body>
</html>
