<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 入退室記録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      user-select: none;
    }

    h2 {
      color: #333;
      font-size: 20px;
      margin-bottom: 16px;
    }

    /* カメラ＋メッセージのラッパー */
    #reader-wrapper {
      position: relative;
      width: min(90vw, 680px);
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #ccc;
    }

    /* メッセージ：映像の上部に重なって表示 */
    #message {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      padding: 14px 18px;
      line-height: 1.6;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      pointer-events: none;
    }

    #message.show { opacity: 1; }
    #message.in  { background: rgba(212, 237, 218, 0.95); color: #1a7a3f; }
    #message.out { background: rgba(248, 215, 218, 0.95); color: #a93226; }
    #message.err { background: rgba(226, 227, 229, 0.95); color: #555; font-size: 15px; }

    /* ロック中のオーバーレイ（映像には重ねない・操作だけブロック） */
    #lock-shield {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      /* 透明だが操作をブロック */
      background: transparent;
    }
    #lock-shield.show { display: block; }

    /* 南京錠ボタン */
    #lock-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid #bbb;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 150;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #lock-btn:active { background: #eee; }
    #lock-btn svg { width: 28px; height: 28px; }

    /* ロック解除オーバーレイ */
    #lock-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #lock-overlay.show { display: flex; }
    #lock-overlay p { color: #fff; font-size: 16px; }

    #pw-input {
      width: 180px;
      padding: 10px 14px;
      font-size: 22px;
      border-radius: 8px;
      border: 1px solid #555;
      text-align: center;
      letter-spacing: 0.2em;
      background: #222;
      color: #fff;
    }

    #pw-error {
      color: #e74c3c;
      font-size: 14px;
      min-height: 20px;
    }

    #pw-submit {
      padding: 10px 28px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    #pw-submit:active { background: #357abd; }
  </style>
</head>
<body>

<h2>QR 入退室記録</h2>

<div id="reader-wrapper">
  <div id="reader"></div>
  <!-- メッセージは映像に重なって表示 -->
  <div id="message"></div>
</div>

<!-- 透明シールド：ロック中に操作をブロック（映像は見える） -->
<div id="lock-shield"></div>

<!-- 南京錠ボタン（シールドより上のz-index） -->
<button id="lock-btn" onclick="handleLockBtn()" title="ロック切り替え">
  <svg id="icon-unlocked" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
  </svg>
  <svg id="icon-locked" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
</button>

<!-- ロック解除オーバーレイ -->
<div id="lock-overlay">
  <p>🔒 ロック中</p>
  <p style="font-size:13px; color:#aaa;">パスワードを入力してロックを解除</p>
  <input type="password" id="pw-input" maxlength="6" placeholder="------"
    oninput="document.getElementById('pw-error').textContent=''"
    onkeydown="if(event.key==='Enter') checkPassword()">
  <div id="pw-error"></div>
  <button id="pw-submit" onclick="checkPassword()">解除</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const GAS_URL        = "https://script.google.com/macros/s/AKfycbwjyfkI6m6RVizT1GRrJBNGOJ_WnZ7WFBBBWmxkTEVgGxta3Nr4Q5g0g0-ku3Ie7vic/exec";
  const API_KEY        = "";
  const COOLDOWN       = 3000;
  const IN_TO_OUT_WAIT = 60000;

  const msgEl      = document.getElementById("message");
  let lastCode     = null;
  let lastTime     = 0;
  let lastType     = null;
  let lastTypeTime = 0;
  let isSending    = false;
  let isLocked     = false;

  // ======== メッセージ ========
  function showMessage(text, type) {
    msgEl.textContent = text;
    msgEl.className   = `show ${type}`;
    clearTimeout(msgEl._timer);
    msgEl._timer = setTimeout(() => { msgEl.className = ""; }, 3000);
  }

  // ======== QRスキャン（ロック中も動作） ========
  async function onScanSuccess(qrCode) {
    const now = Date.now();
    if (qrCode === lastCode && now - lastTime < COOLDOWN) return;
    if (isSending) return;

    if (lastType !== null && now - lastTypeTime < IN_TO_OUT_WAIT) {
      const action = lastType === "IN" ? "入室" : "退室";
      showMessage(`すでに${action}は完了しています。\n次の読み取りは時間をおいてから行ってください。`, "err");
      return;
    }

    lastCode  = qrCode;
    lastTime  = now;
    isSending = true;

    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          student_id: qrCode,
          timestamp:  new Date().toISOString(),
          api_key:    API_KEY
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const name = data.name || qrCode;
      const type = data.type;

      lastType     = type;
      lastTypeTime = Date.now();

      if (type === "IN") {
        showMessage(`${name}さん、こんにちは。\n入室を確認しました。`, "in");
      } else {
        showMessage(`${name}さん、おつかれさまでした。\n退室を確認しました。`, "out");
      }

    } catch {
      showMessage("送信失敗。通信を確認してください。", "err");
    } finally {
      isSending = false;
    }
  }

  // ======== ロック ========
  function handleLockBtn() {
    if (!isLocked) {
      // 1回目：シールドをかけるだけ。パスワード画面は出さない
      isLocked = true;
      document.getElementById("lock-shield").classList.add("show");
      document.getElementById("icon-unlocked").style.display = "none";
      document.getElementById("icon-locked").style.display   = "block";
    } else {
      // 2回目：パスワード入力画面を出す
      document.getElementById("lock-overlay").classList.add("show");
      document.getElementById("pw-input").focus();
    }
  }

  function checkPassword() {
    const val = document.getElementById("pw-input").value;
    if (val === "038491") {
      isLocked = false;
      document.getElementById("lock-shield").classList.remove("show");
      document.getElementById("lock-overlay").classList.remove("show");
      document.getElementById("icon-unlocked").style.display = "block";
      document.getElementById("icon-locked").style.display   = "none";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-error").textContent = "";
    } else {
      document.getElementById("pw-error").textContent = "パスワードが違います";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  // ======== html5-qrcode ========
  const html5QrCode = new Html5QrcodeScanner(
    "reader",
    {
      fps: 10,
      qrbox: { width: 280, height: 280 },
      rememberLastUsedCamera: true,
      showTorchButtonIfSupported: true
    },
    false
  );

  html5QrCode.render(onScanSuccess, () => {});
</script>
</body>
</html>
