<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR 入退室記録</title>
  <style>
    body { font-family: sans-serif; text-align: center; }
    video { width: 75%; height: auto; margin-top: 20px; }
    #result { font-size: 24px; margin-top: 20px; }
    #switchBtn { margin-top: 10px; padding: 8px 16px; font-size: 16px; }
  </style>
</head>
<body>

<h2>QR 入退室記録</h2>
<video id="video"></video>
<br>
<button id="switchBtn">外カメに切り替え</button>
<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
<script>
  const GAS_URL = "★あなたのGASのURL★";
  const API_KEY = "★あなたのAPIキー★";

  const video = document.getElementById("video");
  const result = document.getElementById("result");
  const switchBtn = document.getElementById("switchBtn");

  let currentCamera = "user"; // 最初はインカメ
  let currentStream = null;
  let scanning = false;

  async function startCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentCamera }
      });

      currentStream = stream;
      video.srcObject = stream;

      await video.play();

      if (!scanning) {
        scanning = true;
        requestAnimationFrame(scan);
      }

    } catch (err) {
      console.error("カメラ起動エラー:", err);
      result.textContent = "カメラを起動できませんでした";
    }
  }

  startCamera();

  switchBtn.onclick = () => {
    currentCamera = currentCamera === "user" ? "environment" : "user";
    switchBtn.textContent = currentCamera === "user" ? "外カメに切り替え" : "インカメに切り替え";
    startCamera();
  };

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  function scan() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {

      let w = video.videoWidth;
      let h = video.videoHeight;

      // ★ videoWidth が 0 の場合の対策
      if (w === 0 || h === 0) {
        w = 640;
        h = 480;
      }

      canvas.width = w;
      canvas.height = h;

      // ★ インカメはミラー反転して描画
      if (currentCamera === "user") {
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -w, 0, w, h);
        ctx.restore();
      } else {
        ctx.drawImage(video, 0, 0, w, h);
      }

      const imageData = ctx.getImageData(0, 0, w, h);
      const code = jsQR(imageData.data, w, h);

      if (code) {
        const jukusei = code.data;

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            jukusei: jukusei,
            timestamp: new Date().toISOString(),
            api_key: API_KEY
          })
        });

        result.textContent = `読み取り：${jukusei}`;
        setTimeout(() => result.textContent = "", 2000);
      }
    }

    requestAnimationFrame(scan);
  }
</script>

</body>
</html>
